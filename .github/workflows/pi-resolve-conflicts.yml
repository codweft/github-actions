name: pi-resolve-conflicts

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull request number whose conflicts should be resolved"
        required: false
        type: string
        default: ""
      instruction:
        description: "Conflict resolution instruction for manual callers"
        required: false
        type: string
        default: ""
    secrets:
      KIMI_API_KEY:
        required: false
      ZAI_API_KEY:
        required: false
      MINIMAX_API_KEY:
        required: false

jobs:
  resolve-conflicts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Resolve request
        id: request
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_INSTRUCTION: ${{ inputs.instruction }}
          EVENT_COMMENT_BODY: ${{ github.event.comment.body }}
          EVENT_COMMENT_URL: ${{ github.event.comment.html_url }}
          EVENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_ISSUE_IS_PR: ${{ github.event.issue.pull_request != null }}
        run: |
          set -euo pipefail

          trusted=false
          pr_number=""
          command_body=""
          comment_target="pull_request"
          source_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          case "${{ github.event_name }}" in
            issue_comment)
              association="$EVENT_AUTHOR_ASSOCIATION"
              case "$association" in
                OWNER|MEMBER|COLLABORATOR) trusted=true ;;
              esac
              if [ "$EVENT_ISSUE_IS_PR" != "true" ]; then
                echo "should_run=false" >> "$GITHUB_OUTPUT"
                echo "trusted=$trusted" >> "$GITHUB_OUTPUT"
                echo "pr_number=$EVENT_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
                echo "comment_target=issue" >> "$GITHUB_OUTPUT"
                echo "message=/pi-resolve-conflicts can only be used on pull requests." >> "$GITHUB_OUTPUT"
                exit 0
              fi
              pr_number="$EVENT_ISSUE_NUMBER"
              command_body="$EVENT_COMMENT_BODY"
              source_url="$EVENT_COMMENT_URL"
              ;;
            workflow_dispatch)
              trusted=true
              command_body="${INPUT_INSTRUCTION:-/pi-resolve-conflicts}"
              if [ -z "$INPUT_PR_NUMBER" ]; then
                echo "workflow_dispatch requires pr_number." >&2
                exit 1
              fi
              pr_number="$INPUT_PR_NUMBER"
              ;;
            *)
              echo "Unsupported event: ${{ github.event_name }}" >&2
              exit 1
              ;;
          esac

          if [ "$trusted" != "true" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "trusted=false" >> "$GITHUB_OUTPUT"
            echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
            echo "comment_target=$comment_target" >> "$GITHUB_OUTPUT"
            echo "message=The /pi-resolve-conflicts command can only be used by repository owners, members, or collaborators." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_data=$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json headRepository,headRefName,baseRefName,url)
          head_repo=$(echo "$pr_data" | jq -r '.headRepository.nameWithOwner')
          head_ref=$(echo "$pr_data" | jq -r '.headRefName')
          base_ref=$(echo "$pr_data" | jq -r '.baseRefName')
          pr_url=$(echo "$pr_data" | jq -r '.url')

          if [ "$head_repo" != "$GITHUB_REPOSITORY" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "trusted=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
            echo "comment_target=pull_request" >> "$GITHUB_OUTPUT"
            echo "message=Pi cannot safely create a stacked conflict-resolution PR for forked pull request $pr_url." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch_name="pi-resolve-conflicts/pr-${pr_number}-${GITHUB_RUN_ID}"

          {
            echo "should_run=true"
            echo "trusted=true"
            echo "comment_target=pull_request"
            echo "pr_number=$pr_number"
            echo "checkout_ref=$head_ref"
            echo "base_ref=$base_ref"
            echo "branch_name=$branch_name"
            echo "source_url=$source_url"
            echo "pr_url=$pr_url"
            echo "command_body<<EOF"
            printf '%s\n' "$command_body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment when request is rejected
        if: steps.request.outputs.should_run == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.request.outputs.pr_number }}
          COMMENT_TARGET: ${{ steps.request.outputs.comment_target }}
          MESSAGE: ${{ steps.request.outputs.message }}
        run: |
          set -euo pipefail
          if [ "$COMMENT_TARGET" = "issue" ]; then
            gh issue comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$MESSAGE"
          else
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$MESSAGE"
          fi

      - name: React to trigger comment
        if: steps.request.outputs.should_run == 'true' && github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/comments/${COMMENT_ID}/reactions" \
            -f content="eyes" || true

      - name: Checkout pull request head
        if: steps.request.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.request.outputs.checkout_ref }}

      - name: Create working branch
        if: steps.request.outputs.should_run == 'true'
        env:
          BRANCH_NAME: ${{ steps.request.outputs.branch_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH_NAME"

      - name: Reproduce merge conflicts
        id: conflicts
        if: steps.request.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.request.outputs.pr_number }}
          BASE_REF: ${{ steps.request.outputs.base_ref }}
        run: |
          set -euo pipefail

          git fetch origin "$BASE_REF:refs/remotes/origin/$BASE_REF"

          set +e
          git merge --no-commit --no-ff "origin/$BASE_REF"
          merge_status=$?
          set -e

          if [ "$merge_status" -eq 0 ]; then
            git merge --abort || true
            message="No merge conflicts were found when merging ${BASE_REF} into this pull request head."
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$message"
            echo '{"status":"diagnostic","reason":"No merge conflicts were found."}' > "$RUNNER_TEMP/pi-resolve-conflicts-result.json"
            echo "PI_RESOLVE_CONFLICTS_RESULT_FILE=$RUNNER_TEMP/pi-resolve-conflicts-result.json" >> "$GITHUB_ENV"
            echo "run_agent=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only --diff-filter=U > "$RUNNER_TEMP/pi-conflict-files.txt"
          conflict_count=$(wc -l < "$RUNNER_TEMP/pi-conflict-files.txt" | tr -d ' ')

          if [ "$conflict_count" -eq 0 ]; then
            message="The merge failed, but no conflicted files were detected. Please inspect this workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$message"
            echo '{"status":"diagnostic","reason":"Merge failed without conflicted files."}' > "$RUNNER_TEMP/pi-resolve-conflicts-result.json"
            echo "PI_RESOLVE_CONFLICTS_RESULT_FILE=$RUNNER_TEMP/pi-resolve-conflicts-result.json" >> "$GITHUB_ENV"
            echo "run_agent=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_agent=true" >> "$GITHUB_OUTPUT"
          echo "conflict_count=$conflict_count" >> "$GITHUB_OUTPUT"

      - name: Build conflict context
        if: steps.request.outputs.should_run == 'true' && steps.conflicts.outputs.run_agent == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.request.outputs.pr_number }}
          BASE_REF: ${{ steps.request.outputs.base_ref }}
          CHECKOUT_REF: ${{ steps.request.outputs.checkout_ref }}
          BRANCH_NAME: ${{ steps.request.outputs.branch_name }}
          SOURCE_URL: ${{ steps.request.outputs.source_url }}
          PR_URL: ${{ steps.request.outputs.pr_url }}
          COMMAND_BODY: ${{ steps.request.outputs.command_body }}
        run: |
          set -euo pipefail

          CONTEXT_FILE="$RUNNER_TEMP/pi-resolve-conflicts-context.md"
          {
            echo "# Pi Resolve Conflicts Context"
            echo
            echo "- Repository: ${GITHUB_REPOSITORY}"
            echo "- Pull request: ${PR_URL}"
            echo "- Pull request number: ${PR_NUMBER}"
            echo "- Original head branch: ${CHECKOUT_REF}"
            echo "- Base branch merged into generated branch: ${BASE_REF}"
            echo "- Generated branch: ${BRANCH_NAME}"
            echo "- Source URL: ${SOURCE_URL}"
            echo
            echo "## Command"
            echo
            printf '%s\n' "$COMMAND_BODY"
            echo
            echo "## Pull Request"
            echo
            gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json number,title,body,author,baseRefName,headRefName,url,files,commits
            echo
            echo "## Git Status"
            echo
            echo '```'
            git status --short
            echo '```'
            echo
            echo "## Conflicted Files"
            echo
            cat "$RUNNER_TEMP/pi-conflict-files.txt"
            echo
          } > "$CONTEXT_FILE"

          while IFS= read -r file; do
            {
              echo "### ${file}"
              echo
              echo '```diff'
              git diff -- "$file" || true
              echo '```'
              echo
            } >> "$CONTEXT_FILE"
          done < "$RUNNER_TEMP/pi-conflict-files.txt"

          echo "PI_RESOLVE_CONFLICTS_CONTEXT_FILE=$CONTEXT_FILE" >> "$GITHUB_ENV"
          echo "PI_RESOLVE_CONFLICTS_RESULT_FILE=$RUNNER_TEMP/pi-resolve-conflicts-result.json" >> "$GITHUB_ENV"

      - name: Install Pi Coding Agent
        if: steps.request.outputs.should_run == 'true' && steps.conflicts.outputs.run_agent == 'true'
        run: curl -fsSL https://pi.dev/install.sh | sh

      - name: Run Pi conflict resolver
        if: steps.request.outputs.should_run == 'true' && steps.conflicts.outputs.run_agent == 'true'
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.request.outputs.pr_number }}
          PR_BASE: ${{ steps.request.outputs.checkout_ref }}
          BASE_REF: ${{ steps.request.outputs.base_ref }}
          BRANCH_NAME: ${{ steps.request.outputs.branch_name }}
          SOURCE_URL: ${{ steps.request.outputs.source_url }}
          PR_URL: ${{ steps.request.outputs.pr_url }}
        run: |
          export PATH="$HOME/.pi/bin:$PATH"
          set -o pipefail

          PROMPT_FILE="$RUNNER_TEMP/pi-resolve-conflicts-prompt.txt"
          cat > "$PROMPT_FILE" <<'PROMPT'
          You are an automated coding agent running in GitHub Actions.

          All user-facing comments, commit messages, pull request titles, and pull
          request descriptions MUST be written in English.

          Read the full request context from the file at PI_RESOLVE_CONFLICTS_CONTEXT_FILE.

          Goal:
          - Resolve the active merge conflicts only.
          - Preserve the intent of the original pull request and the current base branch.
          - Do not make unrelated refactors or behavior changes.
          - Run relevant checks you can infer from README files, project files,
            package manifests, solution/project files, or existing workflows.
          - Create exactly one merge-conflict-resolution commit.
          - Push the current branch named in BRANCH_NAME.
          - Open a pull request against PR_BASE.
          - Comment back on the original pull request with the generated PR URL.

          Conflict resolution rules:
          - Inspect every conflicted file from the context.
          - Resolve only files that are currently conflicted unless a small supporting
            change is strictly required to make the resolution compile.
          - After editing, confirm there are no conflict markers left.
          - Stage the resolved files and commit.
          - The pull request body must include:
            - The original PR URL from PR_URL.
            - The source command URL from SOURCE_URL.
            - The conflicted files resolved.
            - Resolution decisions by file.
            - Checks run and their results.
            - Any risks or validation gaps.

          Failure policy:
          - If the conflicts cannot be resolved with confidence, do NOT create a PR.
          - Instead, comment a concise diagnostic on the original pull request:
            what you checked, why you did not produce a resolution, and the next
            concrete step needed from a human.

          GitHub commands:
          - Use `gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"` for the original PR.
          - Use `gh pr create --base "$PR_BASE" --head "$BRANCH_NAME"` to open the stacked PR.

          Result marker:
          - After opening a PR or posting a diagnostic, write JSON to PI_RESOLVE_CONFLICTS_RESULT_FILE:
            {"status":"pr-created","url":"<pull request url>"}
            or
            {"status":"diagnostic","reason":"<short reason>"}
          - Do not write secrets into the result file.
          PROMPT

          RUN_PI="$RUNNER_TEMP/run-pi-resolve-conflicts.sh"
          cat > "$RUN_PI" <<'EOS'
          #!/usr/bin/env bash
          exec pi --mode json --provider "$2" --model "$3" "$(cat "$1")"
          EOS
          chmod +x "$RUN_PI"

          EVENTS_FILE="$RUNNER_TEMP/pi-resolve-conflicts-events.jsonl"
          : > "$EVENTS_FILE"

          run_pi_with_model() {
            local provider="$1"
            local model="$2"
            local secret_name="$3"
            local secret_value="${!secret_name:-}"

            if [ -z "$secret_value" ]; then
              echo "Skipping ${provider}/${model} because ${secret_name} is not configured"
              return 2
            fi

            echo "Trying ${provider}/${model}"
            set +e
            script -qefc "$RUN_PI '$PROMPT_FILE' '$provider' '$model'" /dev/null \
              | tee -a "$EVENTS_FILE" \
              | jq --unbuffered -j '
                def short($n): tostring | gsub("\\s+"; " ")
                  | if length > $n then .[0:$n] + "…" else . end;
                def args_summary:
                  . as $a |
                  if   $a.command   then "$ " + ($a.command   | short(240))
                  elif $a.cmd       then "$ " + ($a.cmd       | short(240))
                  elif $a.file_path then $a.file_path
                  elif $a.path      then $a.path
                  elif $a.file      then $a.file
                  elif $a.url       then $a.url
                  else ($a | tostring | short(240)) end;

                . as $e |
                  if   $e.type == "session"
                       then "\n[session] cwd=\($e.cwd) v=\($e.version)\n"
                  elif $e.type == "agent_start"
                       then "[agent] start\n"
                  elif $e.type == "agent_end"
                       then "\n[agent] done\n"
                  elif $e.type == "turn_start"
                       then "\n──── turn ────\n"
                  elif $e.type == "turn_end"
                       or  $e.type == "message_start"
                       or  $e.type == "message_end"
                       or  $e.type == "tool_execution_update"
                       then empty
                  elif $e.type == "tool_execution_start"
                       then "\n[tool→ \($e.toolName)] " + ($e.args | args_summary) + "\n"
                  elif $e.type == "tool_execution_end"
                       then "[tool"
                            + (if $e.isError then "✗" else "✓" end)
                            + " \($e.toolName)]"
                            + ( ($e.result.content // []) | map(.text // "") | join(" ")
                                | gsub("\\s+"; " ")
                                | if length > 0
                                  then " → " + (.[0:200] + (if length > 200 then "…" else "" end))
                                  else "" end )
                            + "\n"
                  elif $e.type == "message_update" and $e.assistantMessageEvent.type == "thinking_start"
                       then "\n[thinking] "
                  elif $e.type == "message_update" and $e.assistantMessageEvent.type == "thinking_delta"
                       then $e.assistantMessageEvent.delta
                  elif $e.type == "message_update" and $e.assistantMessageEvent.type == "text_start"
                       then "\n[assistant] "
                  elif $e.type == "message_update" and $e.assistantMessageEvent.type == "text_delta"
                       then $e.assistantMessageEvent.delta
                  elif $e.type == "auto_retry_start"
                       then "\n[retry] start (\($e.reason // "?"))\n"
                  elif $e.type == "auto_retry_end"
                       then "[retry] end\n"
                  else empty end
              '
            local pi_status=${PIPESTATUS[0]}
            set +e

            if [ "$pi_status" -eq 0 ]; then
              echo "Pi completed with ${provider}/${model}"
              return 0
            fi

            echo "Pi failed with ${provider}/${model} (exit ${pi_status}); trying next configured model"
            return "$pi_status"
          }

          configured_models=0

          for candidate in \
            "kimi-coding|kimi-for-coding|KIMI_API_KEY" \
            "zai|glm-5.1|ZAI_API_KEY" \
            "minimax|MiniMax-M2.7|MINIMAX_API_KEY"
          do
            IFS='|' read -r provider model secret_name <<< "$candidate"
            if [ -n "${!secret_name:-}" ]; then
              configured_models=$((configured_models + 1))
            fi

            set +e
            run_pi_with_model "$provider" "$model" "$secret_name"
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              exit 0
            fi
          done

          if [ "$configured_models" -eq 0 ]; then
            echo "No Pi model API keys are configured. Configure at least one of KIMI_API_KEY, ZAI_API_KEY, or MINIMAX_API_KEY." >&2
          else
            echo "All configured Pi models failed." >&2
          fi
          exit 1

      - name: Verify Pi conflict result
        if: steps.request.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.request.outputs.pr_number }}
          BRANCH_NAME: ${{ steps.request.outputs.branch_name }}
        run: |
          set -euo pipefail
          if [ -f "$PI_RESOLVE_CONFLICTS_RESULT_FILE" ]; then
            cat "$PI_RESOLVE_CONFLICTS_RESULT_FILE"
            exit 0
          fi

          existing_pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH_NAME" --json url --jq '.[0].url // ""')
          if [ -n "$existing_pr" ]; then
            echo "{\"status\":\"pr-created\",\"url\":\"$existing_pr\"}" > "$PI_RESOLVE_CONFLICTS_RESULT_FILE"
            cat "$PI_RESOLVE_CONFLICTS_RESULT_FILE"
            exit 0
          fi

          message="Pi conflict resolver finished without creating a pull request or diagnostic. Please inspect this workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$message"
          echo '{"status":"diagnostic","reason":"No pull request was created."}' > "$PI_RESOLVE_CONFLICTS_RESULT_FILE"
          cat "$PI_RESOLVE_CONFLICTS_RESULT_FILE"

      - name: Upload Pi conflict event transcript
        if: always() && steps.request.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pi-resolve-conflicts-events-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/pi-resolve-conflicts-events.jsonl
          if-no-files-found: ignore

      - name: Upload Pi conflict context
        if: always() && steps.request.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pi-resolve-conflicts-context-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/pi-resolve-conflicts-context.md
          if-no-files-found: ignore
