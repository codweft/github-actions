name: codweft-implement

on:
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number to implement"
        required: false
        type: string
        default: ""
      instruction:
        description: "Implementation instruction for manual callers"
        required: false
        type: string
        default: ""
      codweft_command_id:
        description: "Codweft command correlation id"
        required: false
        type: string
        default: ""
      source_url:
        description: "GitHub source URL that triggered the command"
        required: false
        type: string
        default: ""
      codweft_api_origin:
        description: "Codweft API origin for App-authored comments"
        required: false
        type: string
        default: "https://codweft.com"
    secrets:
      KIMI_API_KEY:
        required: false
      ZAI_API_KEY:
        required: false
      MINIMAX_API_KEY:
        required: false

jobs:
  implement:
    runs-on: ubuntu-latest
    outputs:
      should_review: ${{ steps.result.outputs.should_review }}
      pr_number: ${{ steps.result.outputs.pr_number }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
      id-token: write
    steps:
      - name: Resolve request
        id: request
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
          INPUT_INSTRUCTION: ${{ inputs.instruction }}
          INPUT_SOURCE_URL: ${{ inputs.source_url }}
          EVENT_COMMENT_BODY: ${{ github.event.comment.body }}
          EVENT_COMMENT_URL: ${{ github.event.comment.html_url }}
          EVENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_ISSUE_IS_PR: ${{ github.event.issue.pull_request != null }}
          EVENT_LABEL_NAME: ${{ github.event.label.name }}
          EVENT_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          default_branch=$(gh repo view "$GITHUB_REPOSITORY" --json defaultBranchRef --jq '.defaultBranchRef.name')
          trusted=false
          issue_number=""
          command_body=""
          source_url="${INPUT_SOURCE_URL:-https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}}"

          case "${{ github.event_name }}" in
            issue_comment)
              case "$EVENT_AUTHOR_ASSOCIATION" in
                OWNER|MEMBER|COLLABORATOR) trusted=true ;;
              esac
              issue_number="$EVENT_ISSUE_NUMBER"
              command_body="$EVENT_COMMENT_BODY"
              source_url="$EVENT_COMMENT_URL"
              if [ "$EVENT_ISSUE_IS_PR" = "true" ]; then
                echo "should_run=false" >> "$GITHUB_OUTPUT"
                echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"
                echo "message=@codweft implement can only be used on issues, not pull requests." >> "$GITHUB_OUTPUT"
                exit 0
              fi
              ;;
            issues)
              issue_number="$EVENT_ISSUE_NUMBER"
              command_body="@codweft implement triggered by label ready-for-codweft"
              if [ "$EVENT_LABEL_NAME" != "ready-for-codweft" ]; then
                echo "should_run=false" >> "$GITHUB_OUTPUT"
                echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"
                echo "message=Ignoring label '$EVENT_LABEL_NAME'. @codweft implement only runs for ready-for-codweft." >> "$GITHUB_OUTPUT"
                exit 0
              fi

              permission=$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${EVENT_ACTOR}/permission" --jq '.permission' 2>/dev/null || echo "none")
              case "$permission" in
                admin|maintain|write) trusted=true ;;
              esac
              ;;
            workflow_dispatch)
              trusted=true
              command_body="${INPUT_INSTRUCTION:-@codweft implement}"
              if [ -z "$INPUT_ISSUE_NUMBER" ]; then
                echo "workflow_dispatch requires issue_number." >&2
                exit 1
              fi
              issue_number="$INPUT_ISSUE_NUMBER"
              ;;
            *)
              echo "Unsupported event: ${{ github.event_name }}" >&2
              exit 1
              ;;
          esac

          if [ "$trusted" != "true" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"
            echo "message=The @codweft implement workflow can only be used by repository owners, members, collaborators, or users with write access." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          issue_data=$(gh issue view "$issue_number" --repo "$GITHUB_REPOSITORY" --json number,url,state)
          issue_state=$(echo "$issue_data" | jq -r '.state')
          issue_url=$(echo "$issue_data" | jq -r '.url')
          if [ "$issue_state" != "OPEN" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"
            echo "message=@codweft implement only runs on open issues. Issue ${issue_number} is ${issue_state}." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          branch_name="codweft-implement/issue-${issue_number}-${GITHUB_RUN_ID}"

          {
            echo "should_run=true"
            echo "issue_number=$issue_number"
            echo "checkout_ref=$default_branch"
            echo "pr_base=$default_branch"
            echo "branch_name=$branch_name"
            echo "issue_url=$issue_url"
            echo "source_url=$source_url"
            echo "command_body<<EOF"
            printf '%s\n' "$command_body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install Codweft GitHub helper
        env:
          CODWEFT_API_ORIGIN: ${{ inputs.codweft_api_origin }}
          CODWEFT_REPOSITORY_ID: ${{ github.repository_id }}
        run: |
          set -euo pipefail
          helper_dir="$RUNNER_TEMP/codweft-bin"
          mkdir -p "$helper_dir"

          cat > "$helper_dir/codweft-api" <<'BASH'
          #!/usr/bin/env bash
          set -euo pipefail
          path="$1"
          body_file="$2"
          api_origin="${CODWEFT_API_ORIGIN:-https://codweft.com}"
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "GitHub Actions OIDC is unavailable. Ensure id-token: write is granted." >&2
            exit 1
          fi
          oidc_token=$(curl -fsSL \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=codweft" | jq -r '.value')
          curl -fsSL \
            -X POST "${api_origin%/}${path}" \
            -H "Authorization: Bearer ${oidc_token}" \
            -H "Content-Type: application/json" \
            --data-binary "@${body_file}"
          BASH

          cat > "$helper_dir/codweft-comment" <<'BASH'
          #!/usr/bin/env bash
          set -euo pipefail
          if [ "$#" -ne 4 ]; then
            echo "Usage: codweft-comment issue|pr NUMBER --body BODY|--body-file FILE" >&2
            exit 2
          fi
          case "$1" in
            issue) target="issue" ;;
            pr|pull_request) target="pull_request" ;;
            *) echo "Unknown comment target: $1" >&2; exit 2 ;;
          esac
          number="$2"
          case "$3" in
            --body) body="$4" ;;
            --body-file) body="$(cat "$4")" ;;
            *) echo "Expected --body or --body-file" >&2; exit 2 ;;
          esac
          body_file=$(mktemp)
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --argjson repositoryId "$CODWEFT_REPOSITORY_ID" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg target "$target" \
            --argjson number "$number" \
            --arg body "$body" \
            '{repository:$repository, repositoryId:$repositoryId, runId:$runId, target:$target, number:$number, body:$body}' \
            > "$body_file"
          codweft-api /api/github/actions/comment "$body_file" >/dev/null
          BASH

          cat > "$helper_dir/codweft-react" <<'BASH'
          #!/usr/bin/env bash
          set -euo pipefail
          if [ "$#" -ne 3 ]; then
            echo "Usage: codweft-react issue-comment|pr-review-comment COMMENT_ID CONTENT" >&2
            exit 2
          fi
          case "$1" in
            issue-comment) target="issue_comment" ;;
            pr-review-comment) target="pull_request_review_comment" ;;
            *) echo "Unknown reaction target: $1" >&2; exit 2 ;;
          esac
          body_file=$(mktemp)
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --argjson repositoryId "$CODWEFT_REPOSITORY_ID" \
            --arg runId "$GITHUB_RUN_ID" \
            --arg target "$target" \
            --argjson commentId "$2" \
            --arg content "$3" \
            '{repository:$repository, repositoryId:$repositoryId, runId:$runId, target:$target, commentId:$commentId, content:$content}' \
            > "$body_file"
          codweft-api /api/github/actions/reaction "$body_file" >/dev/null
          BASH

          chmod +x "$helper_dir/codweft-api" "$helper_dir/codweft-comment" "$helper_dir/codweft-react"
          {
            echo "CODWEFT_API_ORIGIN=${CODWEFT_API_ORIGIN:-https://codweft.com}"
            echo "CODWEFT_REPOSITORY_ID=${CODWEFT_REPOSITORY_ID}"
          } >> "$GITHUB_ENV"
          echo "$helper_dir" >> "$GITHUB_PATH"

      - name: Comment when request is rejected
        if: steps.request.outputs.should_run == 'false'
        env:
          ISSUE_NUMBER: ${{ steps.request.outputs.issue_number }}
          MESSAGE: ${{ steps.request.outputs.message }}
        run: |
          set -euo pipefail
          codweft-comment issue "$ISSUE_NUMBER" --body "$MESSAGE"

      - name: React to trigger comment
        if: steps.request.outputs.should_run == 'true' && github.event_name == 'issue_comment'
        env:
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          set -euo pipefail
          codweft-react issue-comment "$COMMENT_ID" eyes || true

      - name: Checkout default branch
        if: steps.request.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.request.outputs.checkout_ref }}

      - name: Build implementation context
        if: steps.request.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.request.outputs.issue_number }}
          ISSUE_URL: ${{ steps.request.outputs.issue_url }}
          COMMAND_BODY: ${{ steps.request.outputs.command_body }}
          SOURCE_URL: ${{ steps.request.outputs.source_url }}
          BRANCH_NAME: ${{ steps.request.outputs.branch_name }}
          PR_BASE: ${{ steps.request.outputs.pr_base }}
        run: |
          set -euo pipefail

          CONTEXT_FILE="$RUNNER_TEMP/codweft-implement-context.md"
          {
            echo "# Codweft Implement Context"
            echo
            echo "- Repository: ${GITHUB_REPOSITORY}"
            echo "- Issue: ${ISSUE_URL}"
            echo "- Issue number: ${ISSUE_NUMBER}"
            echo "- Source URL: ${SOURCE_URL}"
            echo "- Target base branch: ${PR_BASE}"
            echo "- Generated branch to use when ready: ${BRANCH_NAME}"
            echo
            echo "## Command"
            echo
            printf '%s\n' "$COMMAND_BODY"
            echo
            echo "## Issue"
            echo
            gh issue view "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --json number,title,body,author,labels,state,url,comments,assignees,milestone
            echo
            echo "## Current Repository Files"
            echo
            git ls-files | sed -n '1,400p'
            echo
          } > "$CONTEXT_FILE"

          echo "CODWEFT_IMPLEMENT_CONTEXT_FILE=$CONTEXT_FILE" >> "$GITHUB_ENV"
          echo "CODWEFT_IMPLEMENT_RESULT_FILE=$RUNNER_TEMP/codweft-implement-result.json" >> "$GITHUB_ENV"

      - name: Install coding agent
        if: steps.request.outputs.should_run == 'true'
        run: curl -fsSL https://pi.dev/install.sh | sh

      - name: Run Codweft implement
        if: steps.request.outputs.should_run == 'true'
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.request.outputs.issue_number }}
          ISSUE_URL: ${{ steps.request.outputs.issue_url }}
          PR_BASE: ${{ steps.request.outputs.pr_base }}
          BRANCH_NAME: ${{ steps.request.outputs.branch_name }}
          SOURCE_URL: ${{ steps.request.outputs.source_url }}
        run: |
          export PATH="$HOME/.pi/bin:$PATH"
          set -o pipefail

          PROMPT_FILE="$RUNNER_TEMP/codweft-implement-prompt.txt"
          cat > "$PROMPT_FILE" <<'PROMPT'
          You are an automated coding agent running in GitHub Actions.

          All user-facing comments, commit messages, pull request titles, and pull
          request descriptions MUST be written in English.

          Read the full request context from the file at CODWEFT_IMPLEMENT_CONTEXT_FILE.

          Goal:
          - Implement the complete GitHub issue requested by @codweft implement.
          - This workflow is only for implementing issues. Do not treat it as a
            review-feedback fixer or conflict resolver.
          - Use the full issue history, including your previous questions and human
            answers from earlier @codweft implement attempts.

          Clarification policy:
          - Before creating a branch or pull request, decide whether the issue is
            clear, bounded, and implementable with the available context.
          - If the issue is ambiguous, too broad, missing acceptance criteria, or
            blocked by missing information, do NOT create a branch or PR.
          - Instead, comment concrete questions on the issue with the Codweft
            GitHub App helper:
            codweft-comment issue "$ISSUE_NUMBER" --body "<questions>"
          - Then write {"status":"diagnostic","reason":"<short reason>"} to
            CODWEFT_IMPLEMENT_RESULT_FILE.

          Implementation flow when the issue is ready:
          - Create and switch to the branch named in BRANCH_NAME from the current
            default branch checkout.
          - Configure the git author as github-actions[bot].
          - Create an initial empty commit:
            git commit --allow-empty -m "start pi implementation for issue #$ISSUE_NUMBER"
          - Push BRANCH_NAME.
          - Open a draft pull request against PR_BASE with a body linking ISSUE_URL
            and SOURCE_URL.
          - Implement the smallest complete change that satisfies the issue.
          - Run relevant checks inferred from README files, package manifests,
            solution/project files, or existing workflows.
          - Commit the implementation changes.
          - Push BRANCH_NAME again.
          - Update the PR body with summary, decisions, validation, risks, and the
            linked issue.
          - Mark the PR ready for review.
          - Comment on the issue with the PR URL using codweft-comment.
          - Comment "@codweft review" on the generated PR using codweft-comment so the review workflow starts.

          Failure policy after creating a draft PR:
          - If no real changes were made after the initial empty commit, close the
            draft PR, delete the generated remote branch if possible, comment a
            diagnostic on the issue, and write a diagnostic result marker.
          - If there are useful but incomplete changes, leave the PR as draft,
            comment the blocker on the issue and PR, and write:
            {"status":"draft-blocked","url":"<pull request url>","reason":"<short reason>"}
          - Do not mark a PR ready unless the implementation is complete enough to
            review and you pushed the implementation commit.

          Result marker:
          - After marking the PR ready, write:
            {"status":"pr-ready","url":"<pull request url>"}
          - For incomplete draft work, write:
            {"status":"draft-blocked","url":"<pull request url>","reason":"<short reason>"}
          - For questions or diagnostics without PR, write:
            {"status":"diagnostic","reason":"<short reason>"}
          - Do not write secrets into the result file.
          PROMPT

          RUN_AGENT="$RUNNER_TEMP/run-codweft-implement.sh"
          cat > "$RUN_AGENT" <<'EOS'
          #!/usr/bin/env bash
          exec pi --mode json --provider "$2" --model "$3" "$(cat "$1")"
          EOS
          chmod +x "$RUN_AGENT"

          EVENTS_FILE="$RUNNER_TEMP/codweft-implement-events.jsonl"
          : > "$EVENTS_FILE"

          run_agent_with_model() {
            local provider="$1"
            local model="$2"
            local secret_name="$3"
            local secret_value="${!secret_name:-}"

            if [ -z "$secret_value" ]; then
              echo "Skipping ${provider}/${model} because ${secret_name} is not configured"
              return 2
            fi

            echo "Trying ${provider}/${model}"
            set +e
            script -qefc "$RUN_AGENT '$PROMPT_FILE' '$provider' '$model'" /dev/null \
              | tee -a "$EVENTS_FILE" \
              | jq --unbuffered -j '
                def short($n): tostring | gsub("\\s+"; " ")
                  | if length > $n then .[0:$n] + "…" else . end;
                def args_summary:
                  . as $a |
                  if   $a.command   then "$ " + ($a.command   | short(240))
                  elif $a.cmd       then "$ " + ($a.cmd       | short(240))
                  elif $a.file_path then $a.file_path
                  elif $a.path      then $a.path
                  elif $a.file      then $a.file
                  elif $a.url       then $a.url
                  else ($a | tostring | short(240)) end;

                . as $e |
                  if   $e.type == "session"
                       then "\n[session] cwd=\($e.cwd) v=\($e.version)\n"
                  elif $e.type == "agent_start"
                       then "[agent] start\n"
                  elif $e.type == "agent_end"
                       then "\n[agent] done\n"
                  elif $e.type == "turn_start"
                       then "\n──── turn ────\n"
                  elif $e.type == "turn_end"
                       or  $e.type == "message_start"
                       or  $e.type == "message_end"
                       or  $e.type == "tool_execution_update"
                       then empty
                  elif $e.type == "tool_execution_start"
                       then "\n[tool→ \($e.toolName)] " + ($e.args | args_summary) + "\n"
                  elif $e.type == "tool_execution_end"
                       then "[tool"
                            + (if $e.isError then "✗" else "✓" end)
                            + " \($e.toolName)]"
                            + ( ($e.result.content // []) | map(.text // "") | join(" ")
                                | gsub("\\s+"; " ")
                                | if length > 0
                                  then " → " + (.[0:200] + (if length > 200 then "…" else "" end))
                                  else "" end )
                            + "\n"
                  elif $e.type == "message_update" and $e.assistantMessageEvent.type == "thinking_start"
                       then "\n[thinking] "
                  elif $e.type == "message_update" and $e.assistantMessageEvent.type == "thinking_delta"
                       then $e.assistantMessageEvent.delta
                  elif $e.type == "message_update" and $e.assistantMessageEvent.type == "text_start"
                       then "\n[assistant] "
                  elif $e.type == "message_update" and $e.assistantMessageEvent.type == "text_delta"
                       then $e.assistantMessageEvent.delta
                  elif $e.type == "auto_retry_start"
                       then "\n[retry] start (\($e.reason // "?"))\n"
                  elif $e.type == "auto_retry_end"
                       then "[retry] end\n"
                  else empty end
              '
            local agent_status=${PIPESTATUS[0]}
            set +e

            if [ "$agent_status" -eq 0 ]; then
              echo "Agent completed with ${provider}/${model}"
              return 0
            fi

            echo "Agent failed with ${provider}/${model} (exit ${agent_status}); trying next configured model"
            return "$agent_status"
          }

          configured_models=0

          for candidate in \
            "kimi-coding|kimi-for-coding|KIMI_API_KEY" \
            "zai|glm-5.1|ZAI_API_KEY" \
            "minimax|MiniMax-M2.7|MINIMAX_API_KEY"
          do
            IFS='|' read -r provider model secret_name <<< "$candidate"
            if [ -n "${!secret_name:-}" ]; then
              configured_models=$((configured_models + 1))
            fi

            set +e
            run_agent_with_model "$provider" "$model" "$secret_name"
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              exit 0
            fi
          done

          if [ "$configured_models" -eq 0 ]; then
            echo "No model API keys are configured. Configure at least one of KIMI_API_KEY, ZAI_API_KEY, or MINIMAX_API_KEY." >&2
          else
            echo "All configured agent models failed." >&2
          fi
          exit 1

      - name: Verify Codweft implement result
        id: result
        if: steps.request.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.request.outputs.issue_number }}
          BRANCH_NAME: ${{ steps.request.outputs.branch_name }}
        run: |
          set -euo pipefail
          if [ -f "$CODWEFT_IMPLEMENT_RESULT_FILE" ]; then
            cat "$CODWEFT_IMPLEMENT_RESULT_FILE"
            status=$(jq -r '.status // ""' "$CODWEFT_IMPLEMENT_RESULT_FILE")
            url=$(jq -r '.url // ""' "$CODWEFT_IMPLEMENT_RESULT_FILE")
            if [ "$status" = "pr-ready" ] && [ -n "$url" ] && [ "$url" != "null" ]; then
              echo "should_review=true" >> "$GITHUB_OUTPUT"
              echo "pr_number=${url##*/}" >> "$GITHUB_OUTPUT"
            else
              echo "should_review=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          existing_pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH_NAME" --json url,isDraft --jq '.[0] // empty')
          if [ -n "$existing_pr" ]; then
            url=$(echo "$existing_pr" | jq -r '.url')
            is_draft=$(echo "$existing_pr" | jq -r '.isDraft')
            if [ "$is_draft" = "true" ]; then
              echo "{\"status\":\"draft-blocked\",\"url\":\"$url\",\"reason\":\"the agent did not write a result marker.\"}" > "$CODWEFT_IMPLEMENT_RESULT_FILE"
            else
              echo "{\"status\":\"pr-ready\",\"url\":\"$url\"}" > "$CODWEFT_IMPLEMENT_RESULT_FILE"
            fi
            cat "$CODWEFT_IMPLEMENT_RESULT_FILE"
            if [ "$is_draft" = "true" ]; then
              echo "should_review=false" >> "$GITHUB_OUTPUT"
            else
              echo "should_review=true" >> "$GITHUB_OUTPUT"
              echo "pr_number=${url##*/}" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          message="Codweft implement finished without creating a pull request or diagnostic. Please inspect this workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          codweft-comment issue "$ISSUE_NUMBER" --body "$message"
          echo '{"status":"diagnostic","reason":"No pull request was created."}' > "$CODWEFT_IMPLEMENT_RESULT_FILE"
          cat "$CODWEFT_IMPLEMENT_RESULT_FILE"
          echo "should_review=false" >> "$GITHUB_OUTPUT"

      - name: Upload Codweft implement event transcript
        if: always() && steps.request.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codweft-implement-events-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/codweft-implement-events.jsonl
          if-no-files-found: ignore

      - name: Upload Codweft implement context
        if: always() && steps.request.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codweft-implement-context-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/codweft-implement-context.md
          if-no-files-found: ignore

  review-created-pr:
    needs: implement
    if: needs.implement.outputs.should_review == 'true'
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: codweft/github-actions/.github/workflows/codweft-review.yml@v0.3.0
    with:
      pr_number: ${{ needs.implement.outputs.pr_number }}
      codweft_command_id: ${{ inputs.codweft_command_id }}
      source_url: ${{ inputs.source_url }}
      codweft_api_origin: ${{ inputs.codweft_api_origin }}
    secrets: inherit
