name: codweft-fix

on:
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number to fix for manual callers"
        required: false
        type: string
        default: ""
      pr_number:
        description: "Pull request number to fix for manual callers"
        required: false
        type: string
        default: ""
      instruction:
        description: "Fix instruction for manual callers"
        required: false
        type: string
        default: ""
    secrets:
      KIMI_API_KEY:
        required: false
      ZAI_API_KEY:
        required: false
      MINIMAX_API_KEY:
        required: false

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Resolve request
        id: request
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_INSTRUCTION: ${{ inputs.instruction }}
          EVENT_COMMENT_BODY: ${{ github.event.comment.body }}
          EVENT_COMMENT_URL: ${{ github.event.comment.html_url }}
          EVENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_ISSUE_IS_PR: ${{ github.event.issue.pull_request != null }}
          EVENT_REVIEW_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          default_branch=$(gh repo view "$GITHUB_REPOSITORY" --json defaultBranchRef --jq '.defaultBranchRef.name')
          trusted=false
          target_kind=""
          issue_number=""
          pr_number=""
          command_body=""
          comment_url=""
          checkout_ref="$default_branch"
          pr_base="$default_branch"
          source_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          case "${{ github.event_name }}" in
            issue_comment)
              association="$EVENT_AUTHOR_ASSOCIATION"
              case "$association" in
                OWNER|MEMBER|COLLABORATOR) trusted=true ;;
              esac
              issue_number="$EVENT_ISSUE_NUMBER"
              command_body="$EVENT_COMMENT_BODY"
              comment_url="$EVENT_COMMENT_URL"
              source_url="$comment_url"
              if [ "$EVENT_ISSUE_IS_PR" = "true" ]; then
                target_kind="pull_request"
                pr_number="$issue_number"
              else
                target_kind="issue"
              fi
              ;;
            pull_request_review_comment)
              association="$EVENT_AUTHOR_ASSOCIATION"
              case "$association" in
                OWNER|MEMBER|COLLABORATOR) trusted=true ;;
              esac
              target_kind="pull_request"
              pr_number="$EVENT_REVIEW_PR_NUMBER"
              command_body="$EVENT_COMMENT_BODY"
              comment_url="$EVENT_COMMENT_URL"
              source_url="$comment_url"
              ;;
            workflow_dispatch)
              trusted=true
              command_body="$INPUT_INSTRUCTION"
              if [ -n "$INPUT_PR_NUMBER" ]; then
                target_kind="pull_request"
                pr_number="$INPUT_PR_NUMBER"
              elif [ -n "$INPUT_ISSUE_NUMBER" ]; then
                target_kind="issue"
                issue_number="$INPUT_ISSUE_NUMBER"
              else
                echo "workflow_dispatch requires issue_number or pr_number." >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported event: ${{ github.event_name }}" >&2
              exit 1
              ;;
          esac

          if [ "$target_kind" = "pull_request" ]; then
            pr_data=$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json headRepository,headRefName,baseRefName,url)
            head_repo=$(echo "$pr_data" | jq -r '.headRepository.nameWithOwner')
            head_ref=$(echo "$pr_data" | jq -r '.headRefName')
            base_ref=$(echo "$pr_data" | jq -r '.baseRefName')
            pr_url=$(echo "$pr_data" | jq -r '.url')
            if [ "$head_repo" != "$GITHUB_REPOSITORY" ]; then
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "trusted=$trusted" >> "$GITHUB_OUTPUT"
              echo "target_kind=$target_kind" >> "$GITHUB_OUTPUT"
              echo "issue_number=$pr_number" >> "$GITHUB_OUTPUT"
              echo "message=Codweft fix cannot safely create a stacked PR for forked pull request $pr_url." >> "$GITHUB_OUTPUT"
              exit 0
            fi
            checkout_ref="$head_ref"
            pr_base="$head_ref"
            branch_name="codweft-fix/pr-${pr_number}-${GITHUB_RUN_ID}"
            source_url="$pr_url"
          else
            branch_name="codweft-fix/issue-${issue_number}-${GITHUB_RUN_ID}"
          fi

          if [ "$trusted" != "true" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "trusted=false" >> "$GITHUB_OUTPUT"
            echo "target_kind=$target_kind" >> "$GITHUB_OUTPUT"
            echo "issue_number=${issue_number:-$pr_number}" >> "$GITHUB_OUTPUT"
            echo "message=The @codweft fix command can only be used by repository owners, members, or collaborators." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "should_run=true"
            echo "trusted=true"
            echo "target_kind=$target_kind"
            echo "issue_number=$issue_number"
            echo "pr_number=$pr_number"
            echo "checkout_ref=$checkout_ref"
            echo "pr_base=$pr_base"
            echo "branch_name=$branch_name"
            echo "source_url=$source_url"
            echo "command_body<<EOF"
            printf '%s\n' "$command_body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment when request is rejected
        if: steps.request.outputs.should_run == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_KIND: ${{ steps.request.outputs.target_kind }}
          ISSUE_NUMBER: ${{ steps.request.outputs.issue_number }}
          MESSAGE: ${{ steps.request.outputs.message }}
        run: |
          set -euo pipefail
          if [ "$TARGET_KIND" = "pull_request" ]; then
            gh pr comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$MESSAGE"
          else
            gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$MESSAGE"
          fi

      - name: React to trigger comment
        if: steps.request.outputs.should_run == 'true' && (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment')
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            path="/repos/${{ github.repository }}/pulls/comments/${COMMENT_ID}/reactions"
          else
            path="/repos/${{ github.repository }}/issues/comments/${COMMENT_ID}/reactions"
          fi
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "$path" \
            -f content="eyes" || true

      - name: Checkout repository
        if: steps.request.outputs.should_run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.request.outputs.checkout_ref }}

      - name: Create working branch
        if: steps.request.outputs.should_run == 'true'
        env:
          BRANCH_NAME: ${{ steps.request.outputs.branch_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH_NAME"

      - name: Build request context
        id: context
        if: steps.request.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_KIND: ${{ steps.request.outputs.target_kind }}
          ISSUE_NUMBER: ${{ steps.request.outputs.issue_number }}
          PR_NUMBER: ${{ steps.request.outputs.pr_number }}
          COMMAND_BODY: ${{ steps.request.outputs.command_body }}
          SOURCE_URL: ${{ steps.request.outputs.source_url }}
          PR_BASE: ${{ steps.request.outputs.pr_base }}
          BRANCH_NAME: ${{ steps.request.outputs.branch_name }}
        run: |
          set -euo pipefail
          run_agent=true
          CONTEXT_FILE="$RUNNER_TEMP/codweft-fix-context.md"
          {
            echo "# Codweft Fix Context"
            echo
            echo "- Repository: ${GITHUB_REPOSITORY}"
            echo "- Target kind: ${TARGET_KIND}"
            echo "- Source URL: ${SOURCE_URL}"
            echo "- Working branch: ${BRANCH_NAME}"
            echo "- Pull request base for generated fix: ${PR_BASE}"
            echo
            echo "## Command"
            echo
            printf '%s\n' "$COMMAND_BODY"
            echo
          } > "$CONTEXT_FILE"

          if [ "$TARGET_KIND" = "pull_request" ]; then
            repo_owner="${GITHUB_REPOSITORY%%/*}"
            repo_name="${GITHUB_REPOSITORY#*/}"
            lower_command=$(printf '%s' "$COMMAND_BODY" | tr '[:upper:]' '[:lower:]')
            fix_unresolved_mode=false
            case "$lower_command" in
              *"all unresolved"*|*"todos"*|*"review comments"*|*"review threads"*|*"unresolved review"*|*"hilos no resueltos"*)
                fix_unresolved_mode=true
                ;;
            esac

            threads_json="$RUNNER_TEMP/codweft-fix-review-threads.json"
            gh api graphql \
              -f owner="$repo_owner" \
              -f repo="$repo_name" \
              -F number="$PR_NUMBER" \
              -f query='
                query($owner:String!, $repo:String!, $number:Int!) {
                  repository(owner:$owner, name:$repo) {
                    pullRequest(number:$number) {
                      reviewThreads(first: 100) {
                        nodes {
                          id
                          isResolved
                          isOutdated
                          path
                          line
                          originalLine
                          startLine
                          diffSide
                          comments(first: 50) {
                            nodes {
                              id
                              body
                              author { login }
                              createdAt
                              url
                              path
                              line
                              originalLine
                              diffHunk
                              pullRequestReview { state }
                            }
                          }
                        }
                      }
                    }
                  }
                }' > "$threads_json"

            unresolved_count=$(jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false and .isOutdated == false)] | length' "$threads_json")

            {
              echo "## Pull Request"
              echo
              gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json number,title,body,author,baseRefName,headRefName,url,files,comments
              echo
              echo "## Unresolved Review Threads"
              echo
              echo "Count: ${unresolved_count}"
              echo
              if [ "$unresolved_count" -eq 0 ]; then
                echo "No unresolved non-outdated review threads were found."
              else
                jq -r '
                  .data.repository.pullRequest.reviewThreads.nodes
                  | map(select(.isResolved == false and .isOutdated == false))
                  | to_entries[]
                  | "### Thread " + ((.key + 1) | tostring) + "\n"
                    + "- Thread ID: `" + .value.id + "`\n"
                    + "- Path: `" + (.value.path // "") + "`\n"
                    + "- Line: `" + ((.value.line // .value.originalLine // "") | tostring) + "`\n"
                    + "- Original line: `" + ((.value.originalLine // "") | tostring) + "`\n"
                    + "- Start line: `" + ((.value.startLine // "") | tostring) + "`\n"
                    + "- Diff side: `" + ((.value.diffSide // "") | tostring) + "`\n"
                    + "- First comment URL: " + ((.value.comments.nodes[0].url // "")) + "\n"
                    + "\n"
                    + (.value.comments.nodes
                       | to_entries
                       | map(
                          "#### Comment " + ((.key + 1) | tostring) + "\n"
                          + "- ID: `" + .value.id + "`\n"
                          + "- Author: `" + ((.value.author.login // "") | tostring) + "`\n"
                          + "- Created: `" + .value.createdAt + "`\n"
                          + "- URL: " + .value.url + "\n"
                          + "- Path: `" + ((.value.path // "") | tostring) + "`\n"
                          + "- Line: `" + ((.value.line // .value.originalLine // "") | tostring) + "`\n"
                          + "- Review state: `" + ((.value.pullRequestReview.state // "") | tostring) + "`\n"
                          + "\n"
                          + "Body:\n\n"
                          + (.value.body // "")
                          + "\n\nDiff hunk:\n\n```diff\n"
                          + (.value.diffHunk // "")
                          + "\n```\n"
                        )
                       | join("\n"))
                ' "$threads_json"
              fi
              echo
              echo "## Pull Request Review Comments"
              echo
              gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/comments" --paginate
            } >> "$CONTEXT_FILE"

            if [ "$fix_unresolved_mode" = "true" ] && [ "$unresolved_count" -eq 0 ]; then
              message="No unresolved review threads were found."
              gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$message"
              echo '{"status":"diagnostic","reason":"No unresolved review threads were found."}' > "$RUNNER_TEMP/codweft-fix-result.json"
              run_agent=false
            fi
          else
            {
              echo "## Issue"
              echo
              gh issue view "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --json number,title,body,author,labels,state,url,comments
            } >> "$CONTEXT_FILE"
          fi

          echo "CODWEFT_FIX_CONTEXT_FILE=$CONTEXT_FILE" >> "$GITHUB_ENV"
          echo "CODWEFT_FIX_RESULT_FILE=$RUNNER_TEMP/codweft-fix-result.json" >> "$GITHUB_ENV"
          echo "run_agent=$run_agent" >> "$GITHUB_OUTPUT"

      - name: Install coding agent
        if: steps.request.outputs.should_run == 'true' && steps.context.outputs.run_agent != 'false'
        run: curl -fsSL https://pi.dev/install.sh | sh

      - name: Run Codweft fix
        if: steps.request.outputs.should_run == 'true' && steps.context.outputs.run_agent != 'false'
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          TARGET_KIND: ${{ steps.request.outputs.target_kind }}
          ISSUE_NUMBER: ${{ steps.request.outputs.issue_number }}
          PR_NUMBER: ${{ steps.request.outputs.pr_number }}
          PR_BASE: ${{ steps.request.outputs.pr_base }}
          BRANCH_NAME: ${{ steps.request.outputs.branch_name }}
          SOURCE_URL: ${{ steps.request.outputs.source_url }}
        run: |
          export PATH="$HOME/.pi/bin:$PATH"
          set -o pipefail

          PROMPT_FILE="$RUNNER_TEMP/codweft-fix-prompt.txt"
          cat > "$PROMPT_FILE" <<'PROMPT'
          You are an automated coding agent running in GitHub Actions.

          All user-facing comments, commit messages, pull request titles, and pull
          request descriptions MUST be written in English.

          Read the full request context from the file at CODWEFT_FIX_CONTEXT_FILE.

          Goal:
          - Understand the concrete problem requested by the @codweft fix command.
          - If the command asks to fix all unresolved review threads, review comments,
            or equivalent wording, use the "Unresolved Review Threads" section as the
            primary source of truth and do not act on resolved or outdated feedback.
          - Implement the smallest safe fix.
          - Run the relevant checks you can infer from README files, project files,
            package manifests, solution/project files, or existing workflows.
          - Create exactly one commit with the fix.
          - Push the current branch named in BRANCH_NAME.
          - Open a pull request against PR_BASE.
          - Comment back on the original issue or pull request with the PR URL.
          - When fixing unresolved review threads, include the thread/comment URLs
            addressed by the fix in the pull request body.

          Before editing:
          - Inspect the repo structure and the relevant files.
          - Confirm the bug/task from the command and issue/PR context.
          - For PR targets, check whether the context includes unresolved review
            threads before relying on the flat pull request comment list.
          - Do not change unrelated code.

          Failure policy:
          - If the request is ambiguous, unsafe, too broad, blocked by missing
            credentials, or cannot be validated enough to create a credible fix,
            do NOT create a PR.
          - Instead, comment a concise diagnostic on the original issue or PR:
            what you checked, why you did not produce a fix, and the next concrete
            step needed from a human.

          GitHub commands:
          - Use `gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY"` for issues.
          - Use `gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"` for pull requests.
          - Use `gh pr create --base "$PR_BASE" --head "$BRANCH_NAME"` to open the PR.
          - Include the source URL from SOURCE_URL in the generated PR body.

          Result marker:
          - After opening a PR or posting a diagnostic, write JSON to CODWEFT_FIX_RESULT_FILE:
            {"status":"pr-created","url":"<pull request url>"}
            or
            {"status":"diagnostic","reason":"<short reason>"}
          - Do not write secrets into the result file.
          PROMPT

          RUN_AGENT="$RUNNER_TEMP/run-codweft-fix.sh"
          cat > "$RUN_AGENT" <<'EOS'
          #!/usr/bin/env bash
          exec pi --mode json --provider "$2" --model "$3" "$(cat "$1")"
          EOS
          chmod +x "$RUN_AGENT"

          EVENTS_FILE="$RUNNER_TEMP/codweft-fix-events.jsonl"
          : > "$EVENTS_FILE"

          run_agent_with_model() {
            local provider="$1"
            local model="$2"
            local secret_name="$3"
            local secret_value="${!secret_name:-}"

            if [ -z "$secret_value" ]; then
              echo "Skipping ${provider}/${model} because ${secret_name} is not configured"
              return 2
            fi

            echo "Trying ${provider}/${model}"
            set +e
            script -qefc "$RUN_AGENT '$PROMPT_FILE' '$provider' '$model'" /dev/null \
              | tee -a "$EVENTS_FILE" \
              | jq --unbuffered -j '
                def short($n): tostring | gsub("\\s+"; " ")
                  | if length > $n then .[0:$n] + "…" else . end;
                def args_summary:
                  . as $a |
                  if   $a.command   then "$ " + ($a.command   | short(240))
                  elif $a.cmd       then "$ " + ($a.cmd       | short(240))
                  elif $a.file_path then $a.file_path
                  elif $a.path      then $a.path
                  elif $a.file      then $a.file
                  elif $a.url       then $a.url
                  else ($a | tostring | short(240)) end;

                . as $e |
                  if   $e.type == "session"
                       then "\n[session] cwd=\($e.cwd) v=\($e.version)\n"
                  elif $e.type == "agent_start"
                       then "[agent] start\n"
                  elif $e.type == "agent_end"
                       then "\n[agent] done\n"
                  elif $e.type == "turn_start"
                       then "\n──── turn ────\n"
                  elif $e.type == "turn_end"
                       or  $e.type == "message_start"
                       or  $e.type == "message_end"
                       or  $e.type == "tool_execution_update"
                       then empty
                  elif $e.type == "tool_execution_start"
                       then "\n[tool→ \($e.toolName)] " + ($e.args | args_summary) + "\n"
                  elif $e.type == "tool_execution_end"
                       then "[tool"
                            + (if $e.isError then "✗" else "✓" end)
                            + " \($e.toolName)]"
                            + ( ($e.result.content // []) | map(.text // "") | join(" ")
                                | gsub("\\s+"; " ")
                                | if length > 0
                                  then " → " + (.[0:200] + (if length > 200 then "…" else "" end))
                                  else "" end )
                            + "\n"
                  elif $e.type == "message_update" and $e.assistantMessageEvent.type == "thinking_start"
                       then "\n[thinking] "
                  elif $e.type == "message_update" and $e.assistantMessageEvent.type == "thinking_delta"
                       then $e.assistantMessageEvent.delta
                  elif $e.type == "message_update" and $e.assistantMessageEvent.type == "text_start"
                       then "\n[assistant] "
                  elif $e.type == "message_update" and $e.assistantMessageEvent.type == "text_delta"
                       then $e.assistantMessageEvent.delta
                  elif $e.type == "auto_retry_start"
                       then "\n[retry] start (\($e.reason // "?"))\n"
                  elif $e.type == "auto_retry_end"
                       then "[retry] end\n"
                  else empty end
              '
            local agent_status=${PIPESTATUS[0]}
            set +e

            if [ "$agent_status" -eq 0 ]; then
              echo "Agent completed with ${provider}/${model}"
              return 0
            fi

            echo "Agent failed with ${provider}/${model} (exit ${agent_status}); trying next configured model"
            return "$agent_status"
          }

          configured_models=0

          for candidate in \
            "kimi-coding|kimi-for-coding|KIMI_API_KEY" \
            "zai|glm-5.1|ZAI_API_KEY" \
            "minimax|MiniMax-M2.7|MINIMAX_API_KEY"
          do
            IFS='|' read -r provider model secret_name <<< "$candidate"
            if [ -n "${!secret_name:-}" ]; then
              configured_models=$((configured_models + 1))
            fi

            set +e
            run_agent_with_model "$provider" "$model" "$secret_name"
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              exit 0
            fi
          done

          if [ "$configured_models" -eq 0 ]; then
            echo "No model API keys are configured. Configure at least one of KIMI_API_KEY, ZAI_API_KEY, or MINIMAX_API_KEY." >&2
          else
            echo "All configured agent models failed." >&2
          fi
          exit 1

      - name: Verify Codweft fix result
        if: steps.request.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_KIND: ${{ steps.request.outputs.target_kind }}
          ISSUE_NUMBER: ${{ steps.request.outputs.issue_number }}
          PR_NUMBER: ${{ steps.request.outputs.pr_number }}
          BRANCH_NAME: ${{ steps.request.outputs.branch_name }}
        run: |
          set -euo pipefail
          if [ -f "$CODWEFT_FIX_RESULT_FILE" ]; then
            cat "$CODWEFT_FIX_RESULT_FILE"
            exit 0
          fi

          existing_pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH_NAME" --json url --jq '.[0].url // ""')
          if [ -n "$existing_pr" ]; then
            echo "{\"status\":\"pr-created\",\"url\":\"$existing_pr\"}" > "$CODWEFT_FIX_RESULT_FILE"
            cat "$CODWEFT_FIX_RESULT_FILE"
            exit 0
          fi

          message="Codweft fix finished without creating a pull request or diagnostic. Please inspect this workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ "$TARGET_KIND" = "pull_request" ]; then
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$message"
          else
            gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$message"
          fi
          echo '{"status":"diagnostic","reason":"No pull request was created."}' > "$CODWEFT_FIX_RESULT_FILE"
          cat "$CODWEFT_FIX_RESULT_FILE"

      - name: Upload Codweft fix event transcript
        if: always() && steps.request.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codweft-fix-events-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/codweft-fix-events.jsonl
          if-no-files-found: ignore

      - name: Upload Codweft fix context
        if: always() && steps.request.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: codweft-fix-context-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/codweft-fix-context.md
          if-no-files-found: ignore
